# Cron de email: chama /api/cron/email a cada 15 min (schedule real).
# Vercel Hobby: vercel.json usa 1x/dia (0 12 * * *); este workflow fornece */15.
# Para ativar: criar em GitHub Settings → Secrets and variables → Actions o secret CRON_SECRET
# (mesmo valor da env CRON_SECRET na Vercel).
# Trigger push (main) é temporário para validar acionamento; remover depois.
name: Cron email (15 min)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Debug secret presence
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "event: $GITHUB_EVENT_NAME"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is EMPTY"
            exit 1
          else
            echo "CRON_SECRET length: ${#CRON_SECRET}"
          fi

      - name: Call /api/cron/email
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "X-Debug: 1" \
            "https://uselembra.com.br/api/cron/email" || true)
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "http_code: $code"
          echo "response_body: $body"
          if [ "$code" != "200" ]; then
            echo "Expected 200, got $code"
            exit 1
          fi
