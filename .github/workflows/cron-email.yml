# Cron de email: chama /api/cron/email a cada 15 min (schedule real).
# Vercel Hobby: vercel.json usa 1x/dia (0 12 * * *); este workflow fornece */15.
# Para ativar: criar em GitHub Settings → Secrets and variables → Actions o secret CRON_SECRET
# (mesmo valor da env CRON_SECRET na Vercel).
name: Cron email (15 min)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      debug_user_id:
        description: "Optional user ID for debug (sends X-Debug + X-Debug-UserId)"
        required: false
        type: string
      debug_force:
        description: "Force user as candidate (sends X-Debug-Force: 1)"
        required: false
        type: boolean
        default: false

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Debug secret presence
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "event: $GITHUB_EVENT_NAME"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is EMPTY"
            exit 1
          else
            echo "CRON_SECRET length: ${#CRON_SECRET}"
          fi

      - name: Call /api/cron/email
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG_USER_ID: ${{ github.event.inputs.debug_user_id }}
          DEBUG_FORCE: ${{ github.event.inputs.debug_force }}
        run: |
          EXTRA_HEADERS=()
          [ -n "$DEBUG_USER_ID" ] && EXTRA_HEADERS+=(-H "X-Debug: 1" -H "X-Debug-UserId: $DEBUG_USER_ID")
          [ "$DEBUG_FORCE" = "true" ] && EXTRA_HEADERS+=(-H "X-Debug-Force: 1")
          resp=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${EXTRA_HEADERS[@]}" \
            "https://uselembra.com.br/api/cron/email" || true)
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "http_code: $code"
          echo "response_body: $body"
          if [ "$code" != "200" ]; then
            echo "Expected 200, got $code"
            exit 1
          fi
