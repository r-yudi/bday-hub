<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembra - Never Miss a Birthday</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth, subtle floating animations */
        @keyframes float-soft-1 {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes float-soft-2 {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes float-soft-3 {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-6px) translateX(4px); }
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .animate-float-1 { animation: float-soft-1 6s ease-in-out infinite; }
        .animate-float-2 { animation: float-soft-2 7s ease-in-out infinite 1s; }
        .animate-float-3 { animation: float-soft-3 8s ease-in-out infinite 0.5s; }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }

        /* Very faint background grid */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-[#FCFAF8] text-slate-900 font-sans antialiased min-h-screen overflow-x-hidden relative selection:bg-rose-100 selection:text-rose-900" style="font-family: 'Inter', sans-serif;">

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none bg-grid z-0"></div>
    <!-- Vibrant Party Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[70vw] h-[70vw] max-w-[900px] max-h-[900px] bg-gradient-to-tr from-rose-400/30 via-amber-300/30 to-fuchsia-400/30 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

    <!-- Festive Confetti Particles (Background) -->
    <div class="absolute top-[15%] left-[10%] animate-float-1 z-10 pointer-events-none opacity-60"><div class="w-3 h-3 bg-rose-400 rounded-sm animate-spin-slow"></div></div>
    <div class="absolute top-[25%] right-[15%] animate-float-2 z-10 pointer-events-none opacity-60"><div class="w-4 h-4 bg-amber-400 rounded-full animate-spin-slow" style="animation-direction: reverse;"></div></div>
    <div class="absolute bottom-[20%] left-[20%] animate-float-3 z-10 pointer-events-none opacity-60"><div class="w-2.5 h-2.5 bg-cyan-400 rounded-sm animate-spin-slow"></div></div>
    <div class="absolute top-[60%] right-[8%] animate-float-1 z-10 pointer-events-none opacity-60"><div class="w-3 h-3 bg-fuchsia-400 rounded-sm animate-spin-slow"></div></div>
    <div class="absolute bottom-[10%] right-[30%] animate-float-2 z-10 pointer-events-none opacity-60"><div class="w-3 h-3 bg-emerald-400 rounded-full animate-spin-slow"></div></div>

    <!-- Main Container -->
    <main class="min-h-screen flex flex-col items-center justify-center p-6 relative w-full overflow-hidden">
        
        <!-- Central Layout Grid -->
        <div class="flex w-full h-[80vh] max-w-6xl mx-auto relative items-center justify-center">

            <!-- Background Big Typography -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-0 pointer-events-none select-none">
                <h1 class="font-medium text-[16vw] md:text-[14vw] leading-[0.8] tracking-tighter text-rose-500/[0.04] text-center">
                    LEMBRA
                </h1>
            </div>

            <!-- Center Visual: App Presentation -->
            <div class="relative z-20 group transition-all duration-700 ease-out hover:-translate-y-2">
                <!-- Sleek Image Wrapper with a party vibe -->
                <div class="relative w-64 h-[22rem] md:w-80 md:h-[28rem] rounded-[2rem] overflow-hidden bg-white shadow-[0_20px_40px_-15px_rgba(225,29,72,0.15)] ring-1 ring-slate-900/5">
                    <!-- Dynamic Confetti/Party Representation -->
                    <img src="https://images.unsplash.com/photo-1530103862676-de3c9da59cdd?q=80&amp;w=1000&amp;auto=format&amp;fit=crop" alt="Person celebrating with confetti" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
                    
                    <!-- Subtle inner shadow for depth -->
                    <div class="absolute inset-0 shadow-[inset_0_0_0_1px_rgba(255,255,255,0.2)] pointer-events-none rounded-[2rem]"></div>
                </div>

                <!-- overlapping Modern Badge -->
                <div class="absolute -bottom-6 -right-4 md:-right-8 z-30 transition-transform duration-500 group-hover:scale-105">
                    <div class="bg-white/95 backdrop-blur-md px-5 py-3 rounded-2xl shadow-xl shadow-amber-500/10 ring-1 ring-slate-900/5 flex items-center gap-3">
                        <span class="flex h-2 w-2 rounded-full bg-amber-400 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                        </span>
                        <p class="text-sm font-medium tracking-tight text-slate-700">Time to celebrate!</p>
                    </div>
                </div>
            </div>

            <!-- Floating Interactive Elements (App Features) -->
            
            <!-- Feature 1: Add Birthdays -->
            <div class="absolute top-[12%] left-[5%] md:left-[15%] z-30 animate-float-1 group">
                <div class="relative">
                    <button class="flex items-center gap-2.5 px-5 py-2.5 bg-white text-slate-600 text-sm font-medium rounded-full shadow-sm ring-1 ring-slate-200/60 transition-all duration-300 hover:shadow-md hover:ring-rose-200 hover:text-rose-600 hover:-translate-y-1">
                        <iconify-icon icon="solar:calendar-add-linear" class="text-lg text-rose-500" style="stroke-width: 1.5;"></iconify-icon>
                        Add Birthdays
                    </button>
                    <!-- Precise connecting curve -->
                    <svg class="absolute top-full left-1/2 w-32 h-24 text-rose-300 pointer-events-none hidden md:block opacity-40 transition-opacity group-hover:opacity-100" style="transform: translate(10px, 0);" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10,10 C 30,50 60,70 80,80" stroke-dasharray="4 4"></path>
                    </svg>
                </div>
            </div>

            <!-- Feature 2: Curated Gifts -->
            <div class="absolute top-[20%] right-[2%] md:right-[15%] z-30 animate-float-2 group">
                <div class="relative">
                    <button class="flex items-center gap-2.5 px-5 py-2.5 bg-white text-slate-600 text-sm font-medium rounded-full shadow-sm ring-1 ring-slate-200/60 transition-all duration-300 hover:shadow-md hover:ring-fuchsia-200 hover:text-fuchsia-600 hover:-translate-y-1">
                        <iconify-icon icon="solar:gift-linear" class="text-lg text-fuchsia-500" style="stroke-width: 1.5;"></iconify-icon>
                        Curated Gifts
                    </button>
                    <!-- Precise connecting curve -->
                    <svg class="absolute top-full right-1/2 w-24 h-24 text-fuchsia-300 pointer-events-none hidden md:block opacity-40 transition-opacity group-hover:opacity-100" style="transform: translate(-10px, 0);" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M90,10 C 70,40 50,60 20,70" stroke-dasharray="4 4"></path>
                    </svg>
                </div>
            </div>

            <!-- Feature 3: Smart Reminders -->
            <div class="absolute bottom-[25%] left-[2%] md:left-[18%] z-30 animate-float-3 group">
                <div class="relative">
                    <button class="flex items-center gap-2.5 px-5 py-2.5 bg-white text-slate-600 text-sm font-medium rounded-full shadow-sm ring-1 ring-slate-200/60 transition-all duration-300 hover:shadow-md hover:ring-amber-200 hover:text-amber-600 hover:-translate-y-1">
                        <iconify-icon icon="solar:bell-bing-linear" class="text-lg text-amber-500" style="stroke-width: 1.5;"></iconify-icon>
                        Smart Reminders
                    </button>
                     <!-- Precise connecting curve -->
                     <svg class="absolute bottom-full left-1/2 w-24 h-24 text-amber-300 pointer-events-none hidden md:block opacity-40 transition-opacity group-hover:opacity-100" style="transform: translate(10px, -10px);" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10,90 C 30,60 50,40 80,20" stroke-dasharray="4 4"></path>
                    </svg>
                </div>
            </div>

            <!-- Feature 4: Celebrate -->
            <div class="absolute bottom-[18%] right-[5%] md:right-[18%] z-30 animate-float-1 group">
                <div class="relative">
                    <button class="flex items-center gap-2.5 px-5 py-2.5 bg-white text-slate-600 text-sm font-medium rounded-full shadow-sm ring-1 ring-slate-200/60 transition-all duration-300 hover:shadow-md hover:ring-cyan-200 hover:text-cyan-600 hover:-translate-y-1">
                        <iconify-icon icon="solar:confetti-linear" class="text-lg text-cyan-500" style="stroke-width: 1.5;"></iconify-icon>
                        Celebrate Life
                    </button>
                    <!-- Precise connecting curve -->
                    <svg class="absolute bottom-full right-1/2 w-24 h-32 text-cyan-300 pointer-events-none hidden md:block opacity-40 transition-opacity group-hover:opacity-100" style="transform: translate(-10px, -10px);" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M90,90 C 70,60 40,40 20,20" stroke-dasharray="4 4"></path>
                    </svg>
                </div>
            </div>

        </div>

        <!-- Sleek Notification Widget -->
        <div class="absolute bottom-6 right-6 z-40 hidden md:block animate-float-3">
            <div class="bg-white px-4 py-3.5 rounded-2xl shadow-[0_8px_30px_rgb(225,29,72,0.08)] ring-1 ring-slate-900/5 flex items-start gap-3 w-72 backdrop-blur-sm bg-white/95 border border-rose-50/50">
                <div class="bg-rose-50 text-rose-500 p-2.5 rounded-xl shrink-0">
                    <iconify-icon icon="solar:confetti-linear" class="text-xl" style="stroke-width: 1.5;"></iconify-icon>
                </div>
                <div class="pt-0.5">
                    <p class="text-xs font-semibold text-slate-900 tracking-tight">Party Incoming!</p>
                    <p class="text-xs text-slate-500 mt-1 leading-relaxed">Sarah's birthday is tomorrow. Time to get the balloons ready.</p>
                </div>
            </div>
        </div>

    </main>


</body></html>
